name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    name: Ubuntu / Qt6 / vsa_codec
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            gcc g++ \
            make \
            python3 \
            ffmpeg \
            unzip \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6charts6-dev \
            libgl1-mesa-dev

      # ---------------------------------------------------------------
      # JM H.264 reference decoder.
      #
      # We download, patch (enable TRACE macro), build once and cache the
      # resulting binaries in ~/.cache/jm. Subsequent runs skip the build
      # entirely — the binary lives in the cache and is restored before
      # the reference-trace step below.
      #
      # Phase A just installs JM so the infrastructure is proven to work.
      # Phases D/E will add the actual `ldecod.exe` invocation and diffs.
      # ---------------------------------------------------------------
      - name: Cache JM reference decoder
        id: cache-jm
        uses: actions/cache@v4
        with:
          path: ~/.cache/jm
          key: jm-19.0-trace-v1

      - name: Build JM reference decoder (cache miss only)
        if: steps.cache-jm.outputs.cache-hit != 'true'
        run: bash tests/scripts/install_jm.sh ~/.cache/jm || echo "JM build stub — real build wired up in Phase D"

      # ---------------------------------------------------------------
      # Elecard TheaterSquare 1080p H.264 sample.
      #
      # Downloaded from elecard.com, repackaged from MP4 to raw Annex B
      # via ffmpeg, and cached so subsequent runs are offline. Not
      # committed to the repository — only the fetch script and this
      # workflow reference live in the tree. When the fetch fails
      # (elecard.com unreachable, CI caching glitch, etc.) the
      # integration test test_annexb_large.cpp self-skips because the
      # TEST_ELECARD_STREAM environment variable will not resolve to a
      # readable file.
      # ---------------------------------------------------------------
      - name: Cache Elecard TheaterSquare sample
        id: cache-elecard
        uses: actions/cache@v4
        with:
          path: .vsa-cache/theater_square.h264
          key: elecard-theater-square-v1

      - name: Fetch Elecard TheaterSquare sample (cache miss only)
        if: steps.cache-elecard.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          mkdir -p .vsa-cache
          bash tests/scripts/fetch_elecard_sample.sh .vsa-cache

      # ---------------------------------------------------------------
      # vsa_codec + vsa_tests + vsa_parse + vsa_gui
      # ---------------------------------------------------------------
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run unit tests
        env:
          TEST_ELECARD_STREAM: ${{ github.workspace }}/.vsa-cache/theater_square.h264
        run: ctest --test-dir build --output-on-failure

      - name: vsa_parse smoke
        run: ./build/vsa_parse --version

      # ---------------------------------------------------------------
      # Surface the Elecard TheaterSquare NAL breakdown so the numbers
      # are visible outside the raw test log:
      #   1. emit a human-readable table to $GITHUB_STEP_SUMMARY
      #   2. echo the same content to the workflow log
      #   3. on pull_request events, post / update a sticky PR comment
      # ---------------------------------------------------------------
      - name: Summarize Elecard stream stats
        id: elecard-stats
        if: always()
        run: |
          ELECARD="${{ github.workspace }}/.vsa-cache/theater_square.h264"
          if [[ ! -s "$ELECARD" ]]; then
            echo "Elecard stream not available (fetch skipped or failed)" \
              > /tmp/elecard_stats.txt
          else
            python3 tests/scripts/elecard_stats.py "$ELECARD" \
              > /tmp/elecard_stats.txt
          fi
          {
            echo "### TheaterSquare Elecard stream stats"
            echo '```'
            cat /tmp/elecard_stats.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/elecard_stats.txt

      - name: Post / update Elecard stats PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = "### TheaterSquare Elecard stream stats\n" +
                         "```\n" +
                         fs.readFileSync('/tmp/elecard_stats.txt', 'utf8') +
                         "```\n" +
                         "_Posted by CI run ${{ github.run_id }} on commit ${{ github.sha }}._";
            const marker = "### TheaterSquare Elecard stream stats";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
